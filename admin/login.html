<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | RC Bande Zwickau</title>

<link rel="stylesheet" href="admin.css">

<link rel="icon" href="../assets/images/logo.png">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <img
            src="../assets/images/logo.png"
            alt="RC Bande Zwickau Logo"
            class="login-logo">

        <h1>

            RC Bande Zwickau

        </h1>

        <p>

            Administrationsbereich

        </p>

        <div class="form-group">

            <label>

                Benutzername

            </label>

            <input
                id="username"
                type="text"
                placeholder="Benutzername">

        </div>

        <div class="form-group">

            <label>

                Passwort

            </label>

            <input
                id="password"
                type="password"
                placeholder="Passwort">

        </div>

        <button
            class="login-button"
            onclick="login()">

            Anmelden

        </button>

    </div>

</div>

<script src="login.js"></script>

</body>

</html>
